<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0eb;
      --surface: #fffdf9;
      --surface2: #faf5ef;
      --border: #e8ddd0;
      --text: #2c2118;
      --text-soft: #8c7b6b;
      --primary: #c4703f;
      --primary-light: #f9ece3;
      --primary-hover: #b05e30;
      --success: #4a9e6b;
      --success-light: #e6f4ed;
      --danger: #d14f4f;
      --danger-light: #fceaea;
      --warning: #c9913a;
      --warning-light: #fdf3e0;
      --shadow: 0 1px 3px rgba(44,33,24,0.06), 0 4px 16px rgba(44,33,24,0.04);
      --shadow-md: 0 4px 12px rgba(44,33,24,0.1), 0 1px 3px rgba(44,33,24,0.06);
    }
    html, body { height: 100%; margin: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
    .font-display { font-family: 'Lora', serif; }

    .fade-in { animation: fadeIn 0.35s ease both; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    input, select {
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(196,112,63,0.12);
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0.4;
      cursor: pointer;
    }

    .tab-btn {
      position: relative;
      transition: color 0.15s;
    }
    .tab-btn.active {
      color: var(--primary) !important;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 2px;
      background: var(--primary);
      border-radius: 2px 2px 0 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }
    .card-inner {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-soft);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    .input-field {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      width: 100%;
      padding: 9px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }

    .progress-bar {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }
    .summary-card .label { font-size: 11px; font-weight: 500; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .summary-card .value { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; }

    .expense-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      transition: box-shadow 0.15s;
    }
    .expense-row:hover { box-shadow: var(--shadow-md); }

    .delete-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-soft); padding: 4px;
      border-radius: 6px; transition: color 0.15s, background 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .delete-btn:hover { color: var(--danger); background: var(--danger-light); }

    .login-bg {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(196,112,63,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(196,112,63,0.05) 0%, transparent 60%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-md);
    }

    .form-label { font-size: 12px; font-weight: 600; color: var(--text-soft); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 5px; display: block; }

    .debt-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; }

    .repay-input {
      flex: 1; padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px;
      background: var(--surface2); color: var(--text);
    }
    .repay-input:focus { outline: none; border-color: var(--success); box-shadow: 0 0 0 3px rgba(74,158,107,0.1); }

    /* Bar chart bar animation */
    @keyframes growBar { from { height: 0; } to { height: var(--bar-h); } }
    .bar-animated { animation: growBar 0.5s cubic-bezier(.4,0,.2,1) both; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div id="app" style="min-height:100vh;"></div>
  <script>
let allRecords = [];
let currentUser = null;
let currentView = 'login';
let activeTab = 'expenses';

class LocalDB {
  constructor() {
    this.KEY = 'ft_v2';
    this.allRecords = this.load();
  }
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY) || '[]'); } catch { return []; }
  }
  save() { localStorage.setItem(this.KEY, JSON.stringify(this.allRecords)); }
  async create(rec) {
    rec.__backendId = Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    this.allRecords.push(rec);
    this.save();
    allRecords = this.allRecords;
    renderCurrentView();
    return { isOk: true };
  }
  async update(rec) {
    const i = this.allRecords.findIndex(r => r.__backendId === rec.__backendId);
    if (i > -1) { this.allRecords[i] = rec; this.save(); allRecords = this.allRecords; renderCurrentView(); return { isOk: true }; }
    return { isOk: false };
  }
  async delete(rec) {
    this.allRecords = this.allRecords.filter(r => r.__backendId !== rec.__backendId);
    this.save(); allRecords = this.allRecords; renderCurrentView();
    return { isOk: true };
  }
}

const db = new LocalDB();
allRecords = db.allRecords;
window.dataSdk = db;

const getUsers    = () => allRecords.filter(r => r.record_type === 'user');
const getExpenses = () => allRecords.filter(r => r.record_type === 'expense' && r.user_id === currentUser?.username);
const getDebts    = () => allRecords.filter(r => r.record_type === 'debt'    && r.user_id === currentUser?.username);
const getBudgets  = () => allRecords.filter(r => r.record_type === 'budget'  && r.user_id === currentUser?.username);
const getSavings  = () => allRecords.find (r => r.record_type === 'savings'  && r.user_id === currentUser?.username);
const fmtPKR      = v  => 'PKR ' + parseFloat(v || 0).toLocaleString('en-PK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function showMsg(id, text, isErr) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = 'flex';
  el.style.background = isErr ? 'var(--danger-light)' : 'var(--success-light)';
  el.style.color = isErr ? 'var(--danger)' : 'var(--success)';
  el.style.borderColor = isErr ? '#f4c4c4' : '#b8deca';
  el.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="${isErr ? 'M15 9l-6 6M9 9l6 6' : 'M20 6L9 17l-5-5'}"/></svg> ${text}`;
}

function renderCurrentView() {
  if (currentView === 'login') renderLogin();
  else if (currentView === 'register') renderRegister();
  else renderDashboard();
  if (window.lucide) lucide.createIcons();
}

function renderLogin() {
  document.getElementById('app').innerHTML = `
  <div class="login-bg">
    <div class="login-card fade-in">
      <div style="text-align:center; margin-bottom:32px;">
        <div style="width:52px;height:52px;background:var(--primary-light);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
          <i data-lucide="wallet" style="width:24px;height:24px;color:var(--primary);"></i>
        </div>
        <h1 class="font-display" style="font-size:26px;font-weight:700;color:var(--text);margin:0 0 6px;">Finance Tracker</h1>
        <p style="font-size:13px;color:var(--text-soft);margin:0;">Take control of your money</p>
      </div>
      <div id="login-msg" style="display:none;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;border:1px solid;font-size:13px;margin-bottom:14px;"></div>
      <form id="login-form">
        <div style="margin-bottom:14px;">
          <label class="form-label" for="l-user">Username</label>
          <input id="l-user" type="text" required class="input-field" placeholder="Enter your username">
        </div>
        <div style="margin-bottom:22px;">
          <label class="form-label" for="l-pass">Password</label>
          <input id="l-pass" type="password" required class="input-field" placeholder="Enter your password">
        </div>
        <button type="submit" class="btn-primary" style="width:100%;padding:11px;font-size:14px;">Sign In</button>
      </form>
      <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--text-soft);">
        No account? <button id="go-register" style="background:none;border:none;color:var(--primary);font-weight:600;cursor:pointer;font-size:13px;padding:0;">Create one</button>
      </p>
    </div>
  </div>`;
  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    const u = document.getElementById('l-user').value.trim();
    const p = document.getElementById('l-pass').value;
    const found = getUsers().find(r => r.username === u && r.password === p);
    if (found) { currentUser = found; currentView = 'dashboard'; renderCurrentView(); }
    else showMsg('login-msg', 'Invalid username or password', true);
  });
  document.getElementById('go-register').addEventListener('click', () => { currentView = 'register'; renderCurrentView(); });
}

function renderRegister() {
  document.getElementById('app').innerHTML = `
  <div class="login-bg">
    <div class="login-card fade-in">
      <div style="text-align:center; margin-bottom:32px;">
        <div style="width:52px;height:52px;background:var(--primary-light);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
          <i data-lucide="user-plus" style="width:22px;height:22px;color:var(--primary);"></i>
        </div>
        <h1 class="font-display" style="font-size:26px;font-weight:700;color:var(--text);margin:0 0 6px;">Create Account</h1>
        <p style="font-size:13px;color:var(--text-soft);margin:0;">Start tracking your finances</p>
      </div>
      <div id="reg-msg" style="display:none;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;border:1px solid;font-size:13px;margin-bottom:14px;"></div>
      <form id="reg-form">
        <div style="margin-bottom:14px;">
          <label class="form-label" for="r-user">Username</label>
          <input id="r-user" type="text" required class="input-field" placeholder="Choose a username">
        </div>
        <div style="margin-bottom:6px;">
          <label class="form-label" for="r-pass">Password</label>
        </div>
        <p style="font-size:11px;color:var(--text-soft);margin:0 0 5px;">Minimum 6 characters required</p>
        <input id="r-pass" type="password" required minlength="6" class="input-field" placeholder="Choose a password" style="margin-bottom:22px;">
        <button type="submit" id="reg-btn" class="btn-primary" style="width:100%;padding:11px;font-size:14px;">Create Account</button>
      </form>
      <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--text-soft);">
        Have an account? <button id="go-login" style="background:none;border:none;color:var(--primary);font-weight:600;cursor:pointer;font-size:13px;padding:0;">Sign In</button>
      </p>
    </div>
  </div>`;
  document.getElementById('reg-form').addEventListener('submit', async e => {
    e.preventDefault();
    const u = document.getElementById('r-user').value.trim();
    const p = document.getElementById('r-pass').value;
    if (!u) { showMsg('reg-msg', 'Username cannot be empty', true); return; }
    if (p.length < 6) { showMsg('reg-msg', 'Password must be at least 6 characters', true); return; }
    if (getUsers().find(r => r.username === u)) { showMsg('reg-msg', 'Username already exists', true); return; }
    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'Creating…';
    await db.create({ record_type:'user', username:u, password:p, user_id:u, amount:0, category:'', date:'', name:'', total:0, remaining:0, limit:0, savings_goal:0, savings_current:0 });
    await db.create({ record_type:'savings', username:'', password:'', user_id:u, amount:0, category:'', date:'', name:'', total:0, remaining:0, limit:0, savings_goal:0, savings_current:0 });
    showMsg('reg-msg', 'Account created! Redirecting…', false);
    setTimeout(() => { currentView = 'login'; renderCurrentView(); }, 1100);
  });
  document.getElementById('go-login').addEventListener('click', () => { currentView = 'login'; renderCurrentView(); });
}

function renderDashboard() {
  const expenses = getExpenses();
  const debts    = getDebts();
  const sv       = getSavings();
  const totalSpent   = expenses.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
  const totalDebt    = debts.reduce((s, d) => s + (parseFloat(d.remaining) || 0), 0);
  const savingsCurr  = sv ? (parseFloat(sv.savings_current) || 0) : 0;

  const tabs = ['expenses','debts','budgets','savings','graphs'];
  const tabIcons = { expenses:'receipt', debts:'landmark', budgets:'pie-chart', savings:'piggy-bank', graphs:'bar-chart-3' };
  const tabLabels = { expenses:'Expenses', debts:'Debts', budgets:'Budgets', savings:'Savings', graphs:'Analytics' };

  document.getElementById('app').innerHTML = `
  <div style="min-height:100vh;background:var(--bg);display:flex;flex-direction:column;">

    <!-- Header -->
    <header style="background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;">
      <div style="max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:34px;height:34px;background:var(--primary-light);border-radius:9px;display:flex;align-items:center;justify-content:center;">
            <i data-lucide="wallet" style="width:17px;height:17px;color:var(--primary);"></i>
          </div>
          <span class="font-display" style="font-size:17px;font-weight:700;color:var(--text);">Finance Tracker</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;">
            <i data-lucide="user" style="width:13px;height:13px;color:var(--text-soft);"></i>
            <span style="font-size:12px;font-weight:500;color:var(--text-soft);">${currentUser.username}</span>
          </div>
          <button id="logout-btn" class="btn-ghost" style="font-size:12px;padding:6px 12px;">Logout</button>
        </div>
      </div>
    </header>

    <!-- Summary Cards -->
    <div style="max-width:1100px;margin:0 auto;width:100%;padding:16px 16px 0;">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;" class="fade-in">
        <div class="summary-card">
          <div class="label">Total Spent</div>
          <div class="value" style="color:var(--danger);">${fmtPKR(totalSpent)}</div>
        </div>
        <div class="summary-card">
          <div class="label">Outstanding Debt</div>
          <div class="value" style="color:var(--warning);">${fmtPKR(totalDebt)}</div>
        </div>
        <div class="summary-card">
          <div class="label">Savings</div>
          <div class="value" style="color:var(--success);">${fmtPKR(savingsCurr)}</div>
        </div>
      </div>
    </div>

    <!-- Tabs + Content -->
    <div style="max-width:1100px;margin:0 auto;width:100%;padding:0 16px;flex:1;display:flex;flex-direction:column;">
      <nav style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-top:18px;">
        ${tabs.map(t => `
          <button class="tab-btn ${activeTab===t?'active':''}" data-tab="${t}"
            style="display:flex;align-items:center;gap:6px;padding:10px 14px;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:${activeTab===t?'var(--primary)':'var(--text-soft)'};white-space:nowrap;">
            <i data-lucide="${tabIcons[t]}" style="width:14px;height:14px;"></i>
            ${tabLabels[t]}
          </button>`).join('')}
      </nav>
      <div id="tab-content" style="flex:1;padding:18px 0 28px;"></div>
    </div>
  </div>`;

  document.getElementById('logout-btn').addEventListener('click', () => { currentUser=null; currentView='login'; renderCurrentView(); });
  document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => { activeTab=b.dataset.tab; renderCurrentView(); }));

  const content = document.getElementById('tab-content');
  if (activeTab==='expenses') renderExpensesTab(content);
  else if (activeTab==='debts')   renderDebtsTab(content);
  else if (activeTab==='budgets') renderBudgetsTab(content);
  else if (activeTab==='savings') renderSavingsTab(content);
  else if (activeTab==='graphs')  renderGraphsTab(content);

  if (window.lucide) lucide.createIcons();
}

function renderExpensesTab(container) {
  const expenses = getExpenses();
  const budgets  = getBudgets();
  const today    = new Date().toISOString().split('T')[0];

  container.innerHTML = `
  <div class="fade-in">
    <div class="card" style="padding:16px 18px;margin-bottom:14px;">
      <h3 class="font-display" style="font-size:15px;font-weight:600;margin:0 0 12px;color:var(--text);">Add Expense</h3>
      <form id="exp-form" style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;">
        <div style="flex:1;min-width:110px;">
          <label class="form-label" for="exp-amt">Amount (PKR)</label>
          <input id="exp-amt" type="number" step="0.01" min="0" required class="input-field" placeholder="0.00">
        </div>
        <div style="flex:1;min-width:110px;">
          <label class="form-label" for="exp-cat">Category</label>
          <select id="exp-cat" required class="input-field" style="cursor:pointer;">
            <option value="Food">Food</option><option value="Transport">Transport</option>
            <option value="Housing">Housing</option><option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option><option value="Health">Health</option><option value="Other">Other</option>
          </select>
        </div>
        <div style="flex:1;min-width:120px;">
          <label class="form-label" for="exp-date">Date</label>
          <input id="exp-date" type="date" required class="input-field" value="${today}" readonly style="cursor:not-allowed;opacity:0.8;">
        </div>
        <button type="submit" id="exp-btn" class="btn-primary" style="padding:8px 16px;font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap;">
          <i data-lucide="plus" style="width:14px;height:14px;"></i> Add
        </button>
      </form>
    </div>

    <div id="exp-msg" style="display:none;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;border:1px solid;font-size:13px;margin-bottom:10px;"></div>
    ${renderBudgetWarnings(expenses, budgets)}

    <div style="display:flex;flex-direction:column;gap:8px;">
      ${expenses.length === 0
        ? emptyState('receipt', 'No expenses yet', 'Add your first expense above to get started.')
        : expenses.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(e => {
            const cs = catStyle(e.category);
            const isDebt = e.category === 'Debt Repayment';
            return `
          <div class="expense-row">
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:34px;height:34px;background:${cs.bg};border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i data-lucide="${catIcon(e.category)}" style="width:14px;height:14px;color:${cs.color};"></i>
              </div>
              <div>
                <div style="font-weight:600;font-size:13px;color:var(--text);">${fmtPKR(e.amount)}</div>
                <div style="display:flex;align-items:center;gap:5px;margin-top:2px;">
                  <span class="badge" style="background:${cs.bg};color:${cs.color};">${e.category}</span>
                  ${isDebt && e.name ? `<span style="font-size:10px;color:var(--text-soft);">· ${e.name}</span>` : ''}
                  <span style="font-size:10px;color:var(--text-soft);">${e.date||''}</span>
                </div>
              </div>
            </div>
            <button class="delete-btn del-exp" data-id="${e.__backendId}" title="Delete">

// ─── PIE CHART ────────────────────────────────────────────────────────────────
const PIE_COLORS = ['#c4703f','#4a9e6b','#6a85c4','#d4a847','#a87fc4','#4aabb5','#d46a7a','#7aab6a','#c9913a'];

function makePie(totalsObj) {
  const keys = Object.keys(totalsObj);
  if (!keys.length) return emptyChart('No data yet');
  const total = Object.values(totalsObj).reduce((s,v) => s+v, 0);
  if (total === 0) return emptyChart('No data yet');
  let angle = -90;
  const slices = keys.map((k,i) => {
    const val = totalsObj[k], pct = (val/total)*100, sa = pct/100*360;
    const ea = angle + sa;
    const [x1,y1] = polar(60, angle), [x2,y2] = polar(60, ea);
    const large = sa > 180 ? 1 : 0;
    const d = `M 70,70 L ${70+x1},${70+y1} A 60,60 0 ${large},1 ${70+x2},${70+y2} Z`;
    const s = { d, color: PIE_COLORS[i % PIE_COLORS.length], k, val, pct };
    angle = ea; return s;
  });
  return `
    <div style="display:flex;gap:14px;align-items:center;">
      <svg width="140" height="140" viewBox="0 0 140 140" style="flex-shrink:0;">
        ${slices.map(s => `<path d="${s.d}" fill="${s.color}" opacity="0.88"/>`).join('')}
        <circle cx="70" cy="70" r="28" fill="var(--surface)"/>
      </svg>
      <div style="flex:1;overflow:hidden;">
        ${slices.map(s => `
          <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px;">
            <div style="display:flex;align-items:center;gap:5px;min-width:0;">
              <div style="width:8px;height:8px;border-radius:2px;background:${s.color};flex-shrink:0;"></div>
              <span style="font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.k}</span>
            </div>
            <span style="font-size:11px;font-weight:600;color:var(--text-soft);white-space:nowrap;">${s.pct.toFixed(0)}%</span>
          </div>`).join('')}
      </div>
    </div>`;
}

// ─── BAR CHART (generic, vertical) ───────────────────────────────────────────
function makeBarChart(totalsObj, barColor, showValueOnTop) {
  const keys = Object.keys(totalsObj).sort();
  if (!keys.length) return emptyChart('No data yet');
  const values = keys.map(k => totalsObj[k]);
  const maxVal = Math.max(...values, 1);
  const chartH = 120; // px height of bar area

  const bars = keys.map((k, i) => {
    const val = values[i];
    const hPct = (val / maxVal) * 100;
    const hPx = Math.max(4, (hPct / 100) * chartH);
    const color = barColor || PIE_COLORS[i % PIE_COLORS.length];
    const label = k.length > 7 ? k.slice(5) : k; // for YYYY-MM show MM only if long
    return { k, val, hPx, color, label };
  });

  return `
    <div style="overflow-x:auto;">
      <div style="display:flex;align-items:flex-end;gap:6px;height:${chartH+36}px;min-width:${bars.length*44}px;padding:0 4px;">
        ${bars.map(b => `
          <div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:36px;">
            <div title="${fmtPKR(b.val)}" style="
              width:100%;
              height:${b.hPx}px;
              background:${b.color};
              border-radius:5px 5px 0 0;
              opacity:0.85;
              transition:opacity 0.15s;
              cursor:default;
              position:relative;
            " onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.85'">
              <div style="
                position:absolute;
                bottom:calc(100% + 3px);
                left:50%;transform:translateX(-50%);
                background:var(--text);color:#fff;
                font-size:9px;font-family:'DM Sans',sans-serif;
                padding:2px 5px;border-radius:4px;
                white-space:nowrap;
                pointer-events:none;
                opacity:0;
                transition:opacity 0.15s;
              " class="bar-tip">${fmtPKR(b.val)}</div>
            </div>
            <div style="font-size:9px;color:var(--text-soft);margin-top:5px;text-align:center;word-break:break-all;line-height:1.2;">${b.label}</div>
          </div>`).join('')}
      </div>
    </div>
    <style>
      div[title]:hover .bar-tip { opacity:1 !important; }
    </style>`;
}

// ─── BUDGET VS SPENT — Grouped Bar ───────────────────────────────────────────
function makeBudgetBar(budgets, spentBy) {
  if (!budgets.length) return emptyChart('No budgets set');
  const chartH = 130;
  const allVals = budgets.flatMap(b => [parseFloat(b.limit)||0, spentBy[b.category]||0]);
  const maxVal = Math.max(...allVals, 1);

  return `
    <div style="overflow-x:auto;">
      <div style="display:flex;align-items:flex-end;gap:10px;height:${chartH+52}px;min-width:${budgets.length*90}px;padding:0 4px;">
        ${budgets.map(b => {
          const lim = parseFloat(b.limit)||0;
          const spent = spentBy[b.category]||0;
          const over = spent > lim;
          const limH = Math.max(4, (lim/maxVal)*chartH);
          const spentH = Math.max(4, (spent/maxVal)*chartH);
          return `
          <div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:70px;">
            <div style="display:flex;align-items:flex-end;gap:3px;width:100%;">
              <!-- Budget bar -->
              <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
                <div title="Limit: ${fmtPKR(lim)}" style="
                  width:100%;height:${limH}px;
                  background:var(--primary);opacity:0.65;
                  border-radius:5px 5px 0 0;cursor:default;
                  transition:opacity 0.15s;
                " onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.65'"></div>
              </div>
              <!-- Spent bar -->
              <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
                <div title="Spent: ${fmtPKR(spent)}" style="
                  width:100%;height:${spentH}px;
                  background:${over ? 'var(--danger)' : 'var(--success)'};opacity:0.8;
                  border-radius:5px 5px 0 0;cursor:default;
                  transition:opacity 0.15s;
                " onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.8'"></div>
              </div>
            </div>
            <div style="font-size:10px;color:var(--text);font-weight:600;margin-top:5px;text-align:center;">${b.category}</div>
            ${over ? `<span class="badge" style="background:var(--danger-light);color:var(--danger);margin-top:3px;font-size:9px;">Over</span>` : ''}
          </div>`;
        }).join('')}
      </div>
      <!-- Legend -->
      <div style="display:flex;gap:14px;margin-top:6px;font-size:11px;color:var(--text-soft);">
        <div style="display:flex;align-items:center;gap:5px;">
          <div style="width:10px;height:10px;border-radius:2px;background:var(--primary);opacity:0.65;"></div> Limit
        </div>
        <div style="display:flex;align-items:center;gap:5px;">
          <div style="width:10px;height:10px;border-radius:2px;background:var(--success);"></div> Spent (OK)
        </div>
        <div style="display:flex;align-items:center;gap:5px;">
          <div style="width:10px;height:10px;border-radius:2px;background:var(--danger);"></div> Spent (Over)
        </div>
      </div>
    </div>`;
}

// ─── DEBT PIE ─────────────────────────────────────────────────────────────────
function makeDebtPie(debts) {
  if (!debts.length) return emptyChart('No debts tracked');
  const obj = {};
  debts.forEach(d => { if ((parseFloat(d.remaining)||0) > 0) obj[d.name] = parseFloat(d.remaining)||0; });
  if (!Object.keys(obj).length) return `<div style="text-align:center;padding:20px;font-size:12px;color:var(--success);font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;"><i data-lucide="check-circle-2" style="width:16px;height:16px;"></i> All debts paid!</div>`;
  return makePie(obj);
}

// ─── SAVINGS PIE ──────────────────────────────────────────────────────────────
function makeSavingsPie(current, goal) {
  if (!goal) return emptyChart('No savings goal set');
  const saved = Math.min(current, goal);
  const rem   = Math.max(0, goal - current);
  const obj = {};
  if (saved > 0) obj['Saved'] = saved;
  if (rem > 0)   obj['Remaining'] = rem;
  if (!Object.keys(obj).length) return emptyChart('No data');
  // Override colors: first = success, second = border color
  const keys = Object.keys(obj);
  const total = Object.values(obj).reduce((s,v)=>s+v,0);
  let angle = -90;
  const colors = { 'Saved': 'var(--success)', 'Remaining': 'var(--border)' };
  const slices = keys.map(k => {
    const val = obj[k], pct = (val/total)*100, sa = pct/100*360;
    const ea = angle + sa;
    const [x1,y1] = polar(60, angle), [x2,y2] = polar(60, ea);
    const large = sa > 180 ? 1 : 0;
    const d = `M 70,70 L ${70+x1},${70+y1} A 60,60 0 ${large},1 ${70+x2},${70+y2} Z`;
    const s = { d, color: colors[k] || '#ccc', k, val, pct };
    angle = ea; return s;
  });
  return `
    <div style="display:flex;gap:14px;align-items:center;">
      <svg width="140" height="140" viewBox="0 0 140 140" style="flex-shrink:0;">
        ${slices.map(s=>`<path d="${s.d}" fill="${s.color}" opacity="0.88"/>`).join('')}
        <circle cx="70" cy="70" r="28" fill="var(--surface)"/>
      </svg>
      <div style="flex:1;">
        ${slices.map(s=>`
          <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:7px;">
            <div style="display:flex;align-items:center;gap:5px;">
              <div style="width:8px;height:8px;border-radius:2px;background:${s.color};border:1px solid var(--border);flex-shrink:0;"></div>
              <span style="font-size:11px;color:var(--text);">${s.k}</span>
            </div>
            <span style="font-size:11px;font-weight:600;color:var(--text-soft);">${s.pct.toFixed(0)}%</span>
          </div>`).join('')}
        <div style="margin-top:8px;font-size:11px;color:var(--text-soft);">${fmtPKR(current)} / ${fmtPKR(goal)}</div>
      </div>
    </div>`;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function polar(r, deg) {
  const rad = deg * Math.PI / 180;
  return [r * Math.cos(rad), r * Math.sin(rad)];
}

function emptyChart(msg) {
  return `<div style="text-align:center;padding:24px 16px;font-size:12px;color:var(--text-soft);">${msg}</div>`;
}

function emptyState(icon, title, sub) {
  return `<div style="text-align:center;padding:32px 16px;">
    <div style="width:44px;height:44px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;">
      <i data-lucide="${icon}" style="width:18px;height:18px;color:var(--text-soft);"></i>
    </div>
    <div style="font-weight:600;font-size:13px;color:var(--text);margin-bottom:3px;">${title}</div>
    <div style="font-size:12px;color:var(--text-soft);">${sub}</div>
  </div>`;
}
